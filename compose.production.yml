x-backend-environment: &backend-environment
  NODE_ENV: production
  DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
  MONGODB_URL: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/logmind?authSource=admin
  REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging

  mongodb:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet -u $${MONGO_INITDB_ROOT_USERNAME} -p $${MONGO_INITDB_ROOT_PASSWORD} --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\""]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: ["sh", "-c", "exec redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: .env.production
    environment:
      <<: *backend-environment
      API_PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    logging: *default-logging

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    env_file: .env.production
    environment:
      <<: *backend-environment
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging: *default-logging

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
      args:
        NEXT_PUBLIC_LOGMIND_API_URL: ${PUBLIC_API_URL}
        NEXT_PUBLIC_LOGMIND_CLIENT_KEY: ${NEXT_PUBLIC_LOGMIND_CLIENT_KEY:-}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      HOSTNAME: 0.0.0.0
      LOGMIND_API_URL: http://api:3000
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    logging: *default-logging

  agent:
    build:
      context: .
      dockerfile: apps/agent/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DOCKER_SOCKET: /var/run/docker.sock
      LOGMIND_API_KEY: ${LOGMIND_API_KEY:-}
      LOGMIND_INGEST_ENDPOINT: http://api:3000/logs/ingest
      LOGMIND_AGENT_RETRY_ATTEMPTS: ${LOGMIND_AGENT_RETRY_ATTEMPTS:-3}
      LOGMIND_AGENT_RETRY_DELAY_MS: ${LOGMIND_AGENT_RETRY_DELAY_MS:-1000}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      api:
        condition: service_healthy
    logging: *default-logging

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS}
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      api:
        condition: service_healthy
      dashboard:
        condition: service_healthy
    logging: *default-logging

volumes:
  postgres-data:
  mongo-data:
  redis-data:
  caddy-data:
  caddy-config:
